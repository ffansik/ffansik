<head>
  <meta charset="utf-8" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #07070a;
      --card-bg: rgba(255, 255, 255, 0.02);
      --border-color: rgba(255, 255, 255, 0.06);
      --border-active: rgba(255, 255, 255, 0.2);
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --font-display: 'Outfit', sans-serif;
      --font-sans: 'Space Grotesk', sans-serif;
      --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Constellation canvas background */
    canvas#background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Bento Grid Wrapper */
    .bento-wrapper {
      width: 100%;
      max-width: 800px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-gap: 16px;
      position: relative;
      z-index: 10;
      animation: gridBoot 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes gridBoot {
      to { opacity: 1; }
    }

    /* Frosted Glass Bento Card */
    .bento-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: var(--transition-smooth);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .bento-card:hover {
      border-color: var(--border-active);
      box-shadow: 0 10px 30px rgba(255, 255, 255, 0.03), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    /* Card grid sizing */
    .card-header {
      grid-column: span 2;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      text-align: left;
      gap: 20px;
    }

    .card-socials {
      grid-column: span 1;
      grid-row: span 3;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-contacts {
      grid-column: span 2;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .contacts-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .card-form {
      grid-column: span 2;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Profile details */
    .avatar-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      border: 2px solid #ffffff; /* White border */
      background: url('avatar.png') center/cover no-repeat, #18181b;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.6); /* White neon glow */
    }

    .header-details {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .header-details h1 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .header-details p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* Social List */
    .social-title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .social-list-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-grow: 1;
      justify-content: center;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border-color);
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-main);
      font-size: 0.8rem;
      font-weight: 500;
      transition: var(--transition-smooth);
      cursor: pointer;
    }

    .link-btn-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .link-btn svg.brand-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .link-btn svg.arrow-icon {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: var(--text-muted);
      stroke-width: 2;
      transition: var(--transition-smooth);
    }

    .link-btn:hover {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }

    .link-btn:hover svg.arrow-icon {
      stroke: #000000;
    }

    /* Contact Details */
    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      border: 1px dashed var(--border-color);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 0.78rem;
      color: var(--text-main);
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .copy-btn:hover {
      border-style: solid;
      border-color: #ffffff;
      background: rgba(255, 255, 255, 0.02);
    }

    /* Bento Form Inputs */
    input, textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px 12px;
      border-radius: 10px;
      outline: none;
      font-size: 0.82rem;
      font-family: inherit;
      transition: var(--transition-smooth);
    }

    input:focus, textarea:focus {
      border-color: var(--border-active);
    }

    textarea {
      resize: none;
      height: 50px;
    }

    /* Submit Button */
    .submit-btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .submit-btn:hover {
      background: #e2e2e2;
    }

    .submit-btn:disabled {
      opacity: 0.5;
    }

    /* Spinner */
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: #000000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Bento Toast Alert */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @media (max-width: 580px) {
      #toast-container {
        left: 20px;
        right: 20px;
        bottom: 20px;
      }
    }

    .toast {
      background: #101014;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateY(10px);
      opacity: 0;
      animation: toastIn 0.2s ease forwards;
    }

    .toast svg {
      width: 14px;
      height: 14px;
      stroke: #ffffff;
      stroke-width: 2.5;
      fill: none;
    }

    @keyframes toastIn {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .toast.fade-out {
      animation: toastOut 0.2s ease forwards;
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: scale(0.95);
      }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .bento-wrapper {
        grid-template-columns: 1fr; /* Stacks everything into a single column */
        max-width: 480px;
      }
      .card-header, .card-socials, .card-contacts, .card-form {
        grid-column: span 1;
      }
      .card-socials {
        grid-row: span 1;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 24px 12px;
      }
      .bento-card {
        padding: 16px;
        border-radius: 16px;
      }
      .avatar {
        width: 70px;
        height: 70px;
      }
      .header-details h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

  <script>
    // Copy functions
    function copyPhone(){
      navigator.clipboard.writeText('+77073423793')

        .catch(() => showToast('Error', 'error'));
    }

    function copyEmail(){
      navigator.clipboard.writeText('mastertoibov@gmail.com')
        .then(() => showToast('Email Copied'))
        .catch(() => showToast('Error', 'error'));
    }

    // Toast alert
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      
      const iconSvg = type === 'success' 
        ? `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>`
        : `<svg viewBox="0 0 24 24" style="stroke: #ffffff;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

      toast.innerHTML = `${iconSvg}<span>${message}</span>`;
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('fade-out');
        toast.addEventListener('animationend', () => {
          toast.remove();
        });
      }, 2000);
    }

    // Constellation particle canvas background
    const canvas = document.getElementById('background-canvas');
    const ctx = canvas.getContext('2d');
    
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    
    let particles = [];
    const properties = {
      bgColor: 'rgba(7, 7, 10, 1)',
      particleColor: 'rgba(255, 255, 255, 0.2)',
      particleRadius: 1.5,
      particleCount: 50,
      particleMaxVelocity: 0.3,
      lineLength: 100,
      linkColor: 'rgba(255, 255, 255, 0.05)'
    };
    
    class Particle {
      constructor() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.velocityX = Math.random() * (properties.particleMaxVelocity * 2) - properties.particleMaxVelocity;
        this.velocityY = Math.random() * (properties.particleMaxVelocity * 2) - properties.particleMaxVelocity;
      }
      
      position() {
        if (this.x + this.velocityX > w || this.x + this.velocityX < 0) this.velocityX *= -1;
        if (this.y + this.velocityY > h || this.y + this.velocityY < 0) this.velocityY *= -1;
        this.x += this.velocityX;
        this.y += this.velocityY;
      }
      
      reDraw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, properties.particleRadius, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fillStyle = properties.particleColor;
        ctx.fill();
      }
    }
    
    function drawLines() {
      let x1, y1, x2, y2, length, opacity;
      for (let i in particles) {
        for (let j in particles) {
          x1 = particles[i].x;
          y1 = particles[i].y;
          x2 = particles[j].x;
          y2 = particles[j].y;
          length = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
          if (length < properties.lineLength) {
            opacity = 1 - length / properties.lineLength;
            ctx.lineWidth = 0.5;
            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.05})`;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.closePath();
            ctx.stroke();
          }
        }
      }
    }
    
    function init() {
      particles = [];
      for (let i = 0; i < properties.particleCount; i++) {
        particles.push(new Particle());
      }
    }
    
    function loop() {
      ctx.clearRect(0, 0, w, h);
      for (let i in particles) {
        particles[i].position();
        particles[i].reDraw();
      }
      drawLines();
      requestAnimationFrame(loop);
    }

    init();
    loop();

    window.addEventListener('resize', () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      init();
    });

    // Send Message via Telegram API
    function sendMessage() {
      const nameInput = document.getElementById('name');
      const msgInput = document.getElementById('msg');
      const submitBtn = document.getElementById('submit-btn');
      const btnSpinner = document.getElementById('btn-spinner');
      const btnText = submitBtn.querySelector('.btn-text');

      const name = nameInput.value.trim() || 'Guest';
      const msg = msgInput.value.trim();

      if (!msg) {
        showToast('Message body empty', 'error');
        return;
      }

      submitBtn.disabled = true;
      btnSpinner.style.display = 'block';
      btnText.style.opacity = '0.5';

      const text = `Новое сообщение с сайта:%0AИмя: ${name}%0AТекст: ${msg}`;
      const token = "8441926944:AAGG_XVa_c-yWGgW37nnhhm18JzRSQFz-AM";
      const chat_id = "983627004";

      fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${text}`)
        .then(response => {
          if (!response.ok) throw new Error();
          showToast('Message sent successfully');
          nameInput.value = '';
          msgInput.value = '';
        })
        .catch(() => {
          showToast('Error sending message', 'error');
        })
        .finally(() => {
          submitBtn.disabled = false;
          btnSpinner.style.display = 'none';
          btnText.style.opacity = '1';
        });
    }
  </script>
